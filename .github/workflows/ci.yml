---
name: ci

on:
  workflow_call:

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Check formatting
        run: mise run format --check

  lint:
    name: Syntax Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Run lint
        run: mise run lint --check

  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: >-
            gir1.2-ecal-2.0 gir1.2-edataserver-1.2 gjs gnome-shell
            libglib2.0-bin
          version: 1.0

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Run tests
        run: mise run tests
